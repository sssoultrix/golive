name: auth-service

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://auth:auth@postgres:5432/auth?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: "change_me_change_me_change_me_change_me"
      REFRESH_TOKEN_PEPPER: "change_me"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  cleanup:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CMD_PATH: ./cmd/cleanup-refresh-tokens
    profiles: [tools]
    environment:
      DATABASE_URL: postgres://auth:auth@postgres:5432/auth?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: "change_me_change_me_change_me_change_me"
      REFRESH_TOKEN_PEPPER: "change_me"
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    image: migrate/migrate:v4.18.2
    profiles: [tools]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations

volumes:
  postgres_data:
